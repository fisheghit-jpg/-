<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>System Pro</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

.card{
background:#111c33;
margin:15px;
padding:15px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:10px;
background:#38bdf8;
border:none;
color:black;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #1e293b;
white-space:nowrap;
}

tr:hover{
background:#1e293b;
}
</style>
</head>

<body>

<!-- EMPLOYEES -->
<div class="card">
<h3>Ajouter Employé</h3>

<input id="matricule" placeholder="Matricule">
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">

<button onclick="addEmployee()">Ajouter</button>
</div>

<div class="card">
<h3>Employés</h3>
<table>
<tbody id="empTable"></tbody>
</table>
</div>

<!-- RESERVATIONS -->
<div class="card">
<h3>Réservation</h3>

<input id="rMatricule" placeholder="Matricule">
<input id="hotel" placeholder="Hôtel">
<input id="num" placeholder="Num Réservation">
<input id="date" type="text" placeholder="Période">

<button onclick="addRes()">Ajouter Réservation</button>
</div>

<div class="card">
<h3>Table Réservations</h3>

<table id="bigTable">
<thead>
<tr>
<th>MLE</th>
<th>NOM</th>
<th>HOTEL</th>
<th>N°</th>
<th>PÉRIODE</th>
</tr>
</thead>

<tbody id="resTable"></tbody>
</table>

<br>
<button onclick="sendGmail()">📧 Send Gmail</button>
</div>

<script>

/* ===== DATA ===== */
let employees = JSON.parse(localStorage.getItem("emp")) || [];
let reservations = JSON.parse(localStorage.getItem("res")) || [];

/* ===== SAVE ===== */
function save(){
localStorage.setItem("emp", JSON.stringify(employees));
localStorage.setItem("res", JSON.stringify(reservations));
}

/* ===== EMPLOYEE ===== */
function addEmployee(){
let m=document.getElementById("matricule").value;
let n=document.getElementById("nom").value;
let p=document.getElementById("prenom").value;

employees.push({m,n,p});
save();
renderEmp();
}

function renderEmp(){
let t=document.getElementById("empTable");
t.innerHTML="";

employees.forEach(e=>{
t.innerHTML+=`
<tr>
<td>${e.m}</td>
<td>${e.n}</td>
<td>${e.p}</td>
</tr>
`;
});
}

/* ===== RESERVATION ===== */
function addRes(){

let m=document.getElementById("rMatricule").value;
let hotel=document.getElementById("hotel").value;
let num=document.getElementById("num").value;
let date=document.getElementById("date").value;

reservations.push({m,hotel,num,date});
save();
renderRes();
}

function renderRes(){
let t=document.getElementById("resTable");
t.innerHTML="";

reservations.forEach(r=>{
let emp=employees.find(e=>e.m===r.m);

t.innerHTML+=`
<tr>
<td>${r.m}</td>
<td>${emp?emp.n:"Unknown"}</td>
<td>${r.hotel}</td>
<td>${r.num}</td>
<td>${r.date}</td>
</tr>
`;
});
}

/* ===== GMAIL ===== */
function sendGmail(){

let text="Reservations:\n\n";

reservations.forEach(r=>{
let emp=employees.find(e=>e.m===r.m);
text+=`${r.m} - ${emp?emp.n:""} - ${r.hotel} - ${r.num} - ${r.date}\n`;
});

let subject="Reservations Report";

window.open(
`https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${encodeURIComponent(text)}`
);
}

/* INIT */
renderEmp();
renderRes();

</script>

</body>
</html>
