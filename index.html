<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0b1220,#0f172a);
color:#e5e7eb;
}

/* Card */
.card{
background:#111827;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px rgba(212,175,55,0.08);
border:1px solid rgba(212,175,55,0.15);
}

/* Title */
h2,h3{
text-align:center;
color:#d4af37;
letter-spacing:1px;
}

/* Inputs */
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid rgba(212,175,55,0.2);
background:#0f172a;
color:#f8fafc;
outline:none;
}

input:focus{
border-color:#d4af37;
box-shadow:0 0 8px rgba(212,175,55,0.2);
}

/* Buttons */
button{
padding:10px 12px;
background:#d4af37;
border:none;
color:#0b1220;
border-radius:8px;
cursor:pointer;
margin-top:10px;
margin-right:5px;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
background:#e6c84f;
}

/* Table */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
overflow:hidden;
border-radius:10px;
}

th{
background:#0f172a;
color:#d4af37;
padding:10px;
border-bottom:1px solid rgba(212,175,55,0.2);
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
}

tr:nth-child(even){
background:#0b1220;
}

tr:hover{
background:#1f2937;
transition:0.2s;
}
</style>
