<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservations System</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

.card{
background:#111c33;
margin:15px;
padding:15px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:10px;
background:#38bdf8;
border:none;
color:black;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:#0b1220;
border-radius:8px;
overflow:hidden;
}

th{
background:#1e293b;
color:#38bdf8;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #1e293b;
}

tr:nth-child(even){
background:#0f172a;
}

tr:hover{
background:#1e293b;
}

h2{
text-align:center;
color:#38bdf8;
}
</style>
</head>

<body>

<!-- TITLE -->
<div class="card">
<h2>18 JUIN 2026</h2>
</div>

<!-- FORM -->
<div class="card">
<h3>Ajouter Réservation</h3>

<input id="o" placeholder="O">
<input id="m" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="num" placeholder="N°">
<input id="etab" placeholder="ETABLISSEMENT">
<input id="periode" placeholder="PERIODE">
<input id="status" placeholder="STATUS">

<button onclick="addRes()">Ajouter</button>
<button onclick="openTable()">Ouvrir Tableau</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" placeholder="Recherche..." onkeyup="searchTable()">
</div>

<!-- TABLE -->
<div class="card">
<h3>Table Réservations</h3>

<table>
<thead>
<tr>
<th>O</th>
<th>MLE</th>
<th>NOM</th>
<th>N°</th>
<th>ETABLISSEMENT</th>
<th>PERIODE</th>
<th>STATUS</th>
<th>DELETE</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

<script>

/* DATA */
let reservations = JSON.parse(localStorage.getItem("res")) || [];

/* SAVE */
function save(){
localStorage.setItem("res", JSON.stringify(reservations));
}

/* ADD */
function addRes(){

let r={
o:document.getElementById("o").value,
m:document.getElementById("m").value,
nom:document.getElementById("nom").value,
num:document.getElementById("num").value,
etab:document.getElementById("etab").value,
periode:document.getElementById("periode").value,
status:document.getElementById("status").value
};

reservations.push(r);
save();
render();
}

/* DELETE */
function del(i){
reservations.splice(i,1);
save();
render();
}

/* RENDER */
function render(){

let t=document.getElementById("table");
t.innerHTML="";

reservations.forEach((r,i)=>{
t.innerHTML+=`
<tr>
<td>${r.o}</td>
<td>${r.m}</td>
<td>${r.nom}</td>
<td>${r.num}</td>
<td>${r.etab}</td>
<td>${r.periode}</td>
<td>${r.status}</td>
<td><button onclick="del(${i})" style="background:red;color:white;">X</button></td>
</tr>
`;
});
}
render();

/* SEARCH */
function searchTable(){
let v=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}

/* OPEN CLEAN WINDOW TABLE */
function openTable(){

let w=window.open("","_blank");

let html=`
<html>
<head>
<title>Table</title>
<style>
body{font-family:Segoe UI;background:#0f172a;color:white;padding:20px;}
h2{text-align:center;color:#38bdf8;}
table{width:100%;border-collapse:collapse;background:#0b1220;}
th{background:#1e293b;color:#38bdf8;padding:10px;}
td{padding:10px;border-bottom:1px solid #1e293b;}
tr:nth-child(even){background:#0f172a;}
tr:hover{background:#1e293b;}
</style>
</head>

<body>

<h2>TABLE RESERVATIONS</h2>

<table>
<tr>
<th>O</th><th>MLE</th><th>NOM</th><th>N°</th>
<th>ETABLISSEMENT</th><th>PERIODE</th><th>STATUS</th>
</tr>
`;

reservations.forEach(r=>{
html+=`
<tr>
<td>${r.o}</td>
<td>${r.m}</td>
<td>${r.nom}</td>
<td>${r.num}</td>
<td>${r.etab}</td>
<td>${r.periode}</td>
<td>${r.status}</td>
</tr>
`;
});

html+=`</table></body></html>`;

w.document.write(html);
w.document.close();
}

</script>

</body>
</html>
