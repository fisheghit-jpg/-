<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservation Blue System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0b1b3a,#071022);
color:#e5f2ff;
}

/* HEADER */
h2{
text-align:center;
color:#6ec1ff;
padding:10px;
}

/* CARD */
.card{
margin:15px;
padding:15px;
background:rgba(255,255,255,0.04);
border-radius:12px;
border:1px solid rgba(110,193,255,0.2);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#0a1a33;
color:white;
}

/* BUTTON */
button{
padding:10px 12px;
margin:5px;
background:#4db6ff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:#00152a;
}
button:hover{opacity:0.85}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0d2a4a;
color:#6ec1ff;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #123;
}

tr:hover{
background:#0d1f3a;
}

/* STATUS COLORS */
.green{color:#00ff99;font-weight:bold}
.red{color:#ff5c5c;font-weight:bold}
</style>
</head>

<body>

<h2>SMART RESERVATION SYSTEM</h2>

<div class="card">

<input id="mle" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="prenom" placeholder="PRENOM">
<input id="gsm" placeholder="GSM">
<input id="entite" placeholder="ENTITE">
<input id="lieu" placeholder="LIEU D'AFFECTATION">
<input id="date" placeholder="DATE DEMANDE">
<input id="num" placeholder="N° RESERVATION">

<select id="type">
<option>EXCURSION</option>
<option>CONVENTION</option>
</select>

<select id="prise">
<option>BATAH</option>
<option>RADI</option>
<option>ANASS</option>
<option>BOUHO</option>
<option>KACHBAR</option>
<option>DRH</option>
<option>BAKOFFICE</option>
<option>AUTRE</option>
</select>

<select id="etab">
<option>ETABLISSEMENT 1</option>
<option>ETABLISSEMENT 2</option>
<option>ETABLISSEMENT 3</option>
</select>

<select id="statut">
<option value="EN COURS">EN COURS</option>
<option value="CLOTURE">CLOTURE</option>
</select>

<button onclick="add()">Ajouter</button>
<button onclick="download()">Excel</button>

</div>

<div class="card">
<textarea id="bulk" placeholder="MLE|NOM|PRENOM|GSM|ENTITE|LIEU"></textarea>
<button onclick="bulkImport()">Coller 2000</button>
</div>

<div class="card">
<input id="search" onkeyup="render()" placeholder="Recherche...">
</div>

<div class="card">

<table>
<thead>
<tr>
<th>#</th><th>MLE</th><th>NOM</th><th>PRENOM</th>
<th>GSM</th><th>ENTITE</th><th>LIEU</th><th>STATUT</th>
<th>ACTION</th>
</tr>
</thead>

<tbody id="t"></tbody>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("db")||"[]");

function save(){
localStorage.setItem("db",JSON.stringify(data));
}

function add(){

data.push({
mle:mle.value,
nom:nom.value,
prenom:prenom.value,
gsm:gsm.value,
entite:entite.value,
lieu:lieu.value,
date:date.value,
num:num.value,
type:type.value,
prise:prise.value,
etab:etab.value,
statut:statut.value
});

save();
render();
}

function bulkImport(){

let lines = bulk.value.trim().split("\n");

lines.forEach(l=>{
let p = l.split("|");
if(p.length>=6){
data.push({
mle:p[0],
nom:p[1],
prenom:p[2],
gsm:p[3],
entite:p[4],
lieu:p[5],
statut:"EN COURS"
});
}
});

save();
render();
bulk.value="";
}

function render(){

let v = search.value?.toLowerCase() || "";
t.innerHTML="";

data.forEach((r,i)=>{

let text = Object.values(r).join(" ").toLowerCase();
if(!text.includes(v)) return;

t.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.mle}</td>
<td>${r.nom}</td>
<td>${r.prenom}</td>
<td>${r.gsm}</td>
<td>${r.entite}</td>
<td>${r.lieu}</td>
<td class="${r.statut==="CLOTURE"?"green":"red"}">${r.statut}</td>
<td><button onclick="del(${i})">X</button></td>
</tr>
`;
});

}

function del(i){
data.splice(i,1);
save();
render();
}

function download(){

let ws = XLSX.utils.json_to_sheet(data);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"DATA");
XLSX.writeFile(wb,"reservations.xlsx");

}

render();

</script>

</body>
</html>
