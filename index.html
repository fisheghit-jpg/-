<script>

/****************************************
            CONFIG
****************************************/

const STORAGE = "reservations";

let reservations = [];
let editIndex = null;


/****************************************
            ELEMENTS
****************************************/

const $ = id => document.getElementById(id);

const table = $("table");
const search = $("search");


/****************************************
            STORAGE
****************************************/

function loadData(){

    reservations = JSON.parse(

        localStorage.getItem(STORAGE)

    ) || [];

}


function saveData(){

    localStorage.setItem(

        STORAGE,

        JSON.stringify(reservations)

    );

}


/****************************************
            FORM
****************************************/

function formData(){

return{

m:$("m").value.trim(),

nom:$("nom").value.trim(),

num:$("num").value.trim(),

etab:$("etab").value.trim(),

periode:$("periode").value.trim(),

status:$("status").value.trim()

};

}



function clearForm(){

[
"m",
"nom",
"num",
"etab",
"periode",
"status"

]

.forEach(id=>{

$(id).value="";

});


editIndex=null;

}



/****************************************
        ADD / UPDATE
****************************************/

function addRes(){


const data = formData();



if(!data.nom){

alert("NOM obligatoire");

return;

}




if(editIndex===null){

reservations.push(data);

}


else{


reservations[editIndex]=data;

editIndex=null;


}



saveData();

render();

clearForm();


}




/****************************************
            EDIT
****************************************/

function startEdit(i){


const r = reservations[i];



$("m").value=r.m;

$("nom").value=r.nom;

$("num").value=r.num;

$("etab").value=r.etab;

$("periode").value=r.periode;

$("status").value=r.status;



editIndex=i;


}





/****************************************
            DELETE
****************************************/

function del(i){


if(

confirm(

"Supprimer ?"

)

){


reservations.splice(i,1);

saveData();

render();

}



}




/****************************************
            SEARCH
****************************************/

function searchTable(){

const value=

search.value.toLowerCase();



document

.querySelectorAll("#table tr")

.forEach(row=>{


row.style.display =


row.innerText
.toLowerCase()
.includes(value)


?

""

:

"none";


});


}





/****************************************
            EXPORT
****************************************/

function downloadExcel(){


let csv = "";


csv += "#,MLE,NOM,N°,ETABLISSEMENT,PERIODE,STATUS\n";



reservations.forEach((r,i)=>{


csv +=


`${i+1},
${r.m},
${r.nom},
${r.num},
${r.etab},
${r.periode},
${r.status}\n`;


});



const blob = new Blob(

[csv],

{

type:"text/csv;charset=utf-8;"

}

);



const url=

URL.createObjectURL(blob);



const link=

document.createElement("a");


link.href=url;

link.download="Reservations.csv";


document.body.appendChild(link);

link.click();

document.body.removeChild(link);


URL.revokeObjectURL(url);



}





/****************************************
            RENDER
****************************************/

function render(){


const tbody = $("table");

tbody.innerHTML="";



reservations.forEach((r,i)=>{


const tr = document.createElement("tr");



tr.innerHTML=`

<td>${i+1}</td>

<td>${r.m}</td>

<td>${r.nom}</td>

<td>${r.num}</td>

<td>${r.etab}</td>

<td>${r.periode}</td>

<td>${r.status}</td>

<td>

<button onclick="startEdit(${i})">

✏️

</button>


<button

onclick="del(${i})"

style="background:#dc2626;color:white;">


🗑️


</button>

</td>

`;



tbody.appendChild(tr);


});


}



/****************************************
            INIT
****************************************/

loadData();

render();

</script>
