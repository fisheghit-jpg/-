<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservation System Pro</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

.card{
background:#111c33;
margin:15px;
padding:15px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:10px;
background:#38bdf8;
border:none;
color:black;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #1e293b;
white-space:nowrap;
}

tr:hover{
background:#1e293b;
}

#todayDate{
text-align:center;
font-size:22px;
color:#38bdf8;
}
</style>
</head>

<body>

<!-- DATE -->
<div class="card">
<h2 id="todayDate"></h2>
</div>

<!-- ADD RESERVATION -->
<div class="card">
<h3>Ajouter Réservation</h3>

<input id="o" placeholder="O">
<input id="m" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="num" placeholder="N°">
<input id="etab" placeholder="ETABLISSEMENT">
<input id="periode" placeholder="PERIODE DE RESERVATION">
<input id="status" placeholder="AUJOURD'HUI (STATUS)">

<button onclick="addRes()">Ajouter</button>
<button onclick="exportCSV()">Export Excel</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" placeholder="Recherche..." onkeyup="searchTable()">
</div>

<!-- TABLE -->
<div class="card">
<h3>Table Réservations</h3>

<table>
<thead>
<tr>
<th>O</th>
<th>MLE</th>
<th>NOM</th>
<th>N°</th>
<th>ETABLISSEMENT</th>
<th>PERIODE</th>
<th>AUJOURD'HUI</th>
<th>DELETE</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

<script>

/* ===== DATA ===== */
let reservations = JSON.parse(localStorage.getItem("res")) || [];

/* ===== SAVE ===== */
function save(){
localStorage.setItem("res", JSON.stringify(reservations));
}

/* ===== DATE AUTO ===== */
function setDate(){
let d=new Date();
let months=[
"JANVIER","FÉVRIER","MARS","AVRIL","MAI","JUIN",
"JUILLET","AOÛT","SEPTEMBRE","OCTOBRE","NOVEMBRE","DÉCEMBRE"
];
document.getElementById("todayDate").innerText =
`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
setDate();

/* ===== ADD ===== */
function addRes(){

let data={
o:document.getElementById("o").value,
m:document.getElementById("m").value,
nom:document.getElementById("nom").value,
num:document.getElementById("num").value,
etab:document.getElementById("etab").value,
periode:document.getElementById("periode").value,
status:document.getElementById("status").value
};

reservations.push(data);
save();
render();
}

/* ===== COLOR STATUS ===== */
function getColor(s){
s=s.toLowerCase();

if(s.includes("prise")) return "#22c55e";
if(s.includes("attente")) return "#facc15";
if(s.includes("refus")) return "#ef4444";
if(s.includes("urgent")) return "#f97316";

return "white";
}

/* ===== DELETE ===== */
function del(i){
reservations.splice(i,1);
save();
render();
}

/* ===== RENDER ===== */
function render(){

let t=document.getElementById("table");
t.innerHTML="";

reservations.forEach((r,i)=>{
t.innerHTML+=`
<tr>
<td>${r.o}</td>
<td>${r.m}</td>
<td>${r.nom}</td>
<td>${r.num}</td>
<td>${r.etab}</td>
<td>${r.periode}</td>
<td style="color:${getColor(r.status)}">${r.status}</td>
<td><button onclick="del(${i})">🗑</button></td>
</tr>
`;
});
}
render();

/* ===== SEARCH ===== */
function searchTable(){
let value=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(value)?"":"none";
});
}

/* ===== EXPORT CSV ===== */
function exportCSV(){

let csv="O,MLE,NOM,N°,ETABLISSEMENT,PERIODE,STATUS\n";

reservations.forEach(r=>{
csv+=`${r.o},${r.m},${r.nom},${r.num},${r.etab},${r.periode},${r.status}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reservations.csv";
a.click();
}

</script>

</body>
</html>
