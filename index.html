<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Reservation Gold</title>


<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}



body{

background:#0F172A;

color:white;

padding:20px;

}



/* Cards */

.card{

background:#111827;

padding:20px;

margin-bottom:20px;

border-radius:15px;

border:1px solid rgba(212,175,55,.15);

box-shadow:
0 0 15px rgba(0,0,0,.3);

}



/* title */

h1{

text-align:center;

color:#D4AF37;

margin-bottom:15px;

font-size:30px;

}



/* inputs */

input,textarea{

width:100%;

padding:12px;

margin-top:8px;

margin-bottom:8px;

border:none;

outline:none;

border-radius:10px;

background:#1E293B;

color:white;

font-size:15px;

}



input:focus,
textarea:focus{

box-shadow:

0 0 5px #D4AF37;

}



textarea{

height:180px;

resize:none;

}




/* buttons */

button{

padding:12px 18px;

border:none;

cursor:pointer;

border-radius:10px;

font-weight:bold;

margin:5px;

transition:.2s;

}



.gold{

background:#D4AF37;

color:black;

}



.red{

background:#dc2626;

color:white;

}



.blue{

background:#2563eb;

color:white;

}



button:hover{

opacity:.9;

transform:translateY(-2px);

}




/* table */

table{

width:100%;

border-collapse:collapse;

margin-top:15px;

overflow:hidden;

border-radius:10px;

}



th{

background:#1E293B;

color:#D4AF37;

padding:12px;

}



td{

padding:12px;

text-align:center;

border-bottom:1px solid #1f2937;

}



tr:nth-child(even){

background:#0b1220;

}



tr:hover{

background:#1E293B;

}



/* search */

.search{

margin-top:10px;

}



</style>


</head>


<body>




<div class="card">

<h1>

Reservation Gold

</h1>

</div>





<div class="card">


<input id="m"

placeholder="MLE">



<input id="nom"

placeholder="Nom">



<input id="prenom"

placeholder="Prénom">



<input id="ent"

placeholder="Ent_affect">



<input id="lieu"

placeholder="Lieu_affect">



<input id="gsm"

placeholder="GSM">



<button class="gold"

onclick="addRes()">

Ajouter

</button>



<button class="blue"

onclick="clearForm()">

Annuler

</button>



<button class="gold"

onclick="downloadExcel()">

Excel

</button>



</div>




<div class="card">


<h3 style="color:#D4AF37">

Coller 2000 Employés

</h3>



<textarea

id="bulk"

placeholder="MLE|nom|prenom|Ent_affect|Lieu_affect|GSM"></textarea>



<button class="gold"

onclick="pasteEmployees()">

Importer

</button>



</div>





<div class="card">


<input

id="search"

class="search"

placeholder="Recherche..."

onkeyup="searchTable()">



<table>


<thead>

<tr>

<th>#</th>

<th>MLE</th>

<th>Nom</th>

<th>Prénom</th>

<th>Ent_affect</th>

<th>Lieu_affect</th>

<th>GSM</th>

<th>Action</th>

</tr>


</thead>



<tbody id="table">


</tbody>


</table>



</div>
