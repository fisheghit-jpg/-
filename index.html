<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservation Pro System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#eaf2ff;
color:#0f172a;
}

/* HEADER */
.header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */
.card{
background:white;
margin:12px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #cbd5e1;
outline:none;
}

input:focus,select:focus,textarea:focus{
border-color:#2563eb;
}

/* BUTTON */
button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#1e3a8a;
color:white;
padding:8px;
position:sticky;
top:0;
}

td{
padding:8px;
border-bottom:1px solid #e5e7eb;
}

tr:nth-child(even){
background:#f8fafc;
}

.status-ok{
background:#dcfce7 !important;
}

.status-wait{
background:#fee2e2 !important;
}
</style>
</head>

<body>

<div class="header">
SYSTEME RESERVATION BLUE & WHITE
</div>

<div class="card">

<input id="mle" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="prenom" placeholder="PRENOM">
<input id="gsm" placeholder="GSM">
<input id="entite" placeholder="ENTITE">
<input id="lieu" placeholder="LIEU AFFECTATION">
<input id="date_demande" type="date">

<input id="num_res" placeholder="N° RESERVATION">

<select id="type_res">
<option>EXCURSION</option>
<option>CONVENTION</option>
</select>

<input id="checkin" type="date">
<input id="checkout" type="date">

<select id="prise_charge">
<option>BATAH</option>
<option>RADI</option>
<option>ANASS</option>
<option>BOUHO</option>
<option>KACHBAR</option>
<option>DRH</option>
<option>BAKOFFICE</option>
<option>AUTRE</option>
</select>

<select id="statut">
<option value="ENC">EN COURS</option>
<option value="CLT">CLOTURE</option>
</select>

<button onclick="add()">AJOUTER</button>
<button onclick="exportExcel()">EXPORT EXCEL</button>
<button onclick="importBulk()">IMPORT COLLAB</button>

<textarea id="bulk" placeholder="MLE|NOM|PRENOM|ENTITE|LIEU|GSM"></textarea>

</div>

<div class="card">

<input id="search" onkeyup="render()" placeholder="Recherche...">

<table>
<thead>
<tr>
<th>#</th><th>MLE</th><th>NOM</th><th>PRENOM</th><th>ENTITE</th><th>LIEU</th><th>GSM</th><th>STATUT</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("db")||"[]");

/* SAVE */
function save(){
localStorage.setItem("db",JSON.stringify(data));
}

/* ADD */
function add(){

data.push({
mle:mle.value,
nom:nom.value,
prenom:prenom.value,
gsm:gsm.value,
entite:entite.value,
lieu:lieu.value,
statut:statut.value
});

save();
render();
}

/* IMPORT BULK */
function importBulk(){

let lines = bulk.value.trim().split("\n");

lines.forEach(l=>{
let p = l.split("|");
if(p.length>=5){
data.push({
mle:p[0],
nom:p[1],
prenom:p[2],
entite:p[3],
lieu:p[4],
gsm:p[5]
});
}
});

save();
render();
bulk.value="";
}

/* RENDER */
function render(){

let v = search.value ? search.value.toLowerCase() : "";

t.innerHTML="";

data.forEach((r,i)=>{

let txt = Object.values(r).join(" ").toLowerCase();

if(txt.includes(v)){

let statusClass = (r.statut=="CLT")?"status-ok":"status-wait";

t.innerHTML+=`
<tr class="${statusClass}">
<td>${i+1}</td>
<td>${r.mle}</td>
<td>${r.nom}</td>
<td>${r.prenom}</td>
<td>${r.entite}</td>
<td>${r.lieu}</td>
<td>${r.gsm}</td>
<td>${r.statut||""}</td>
</tr>`;
}

});

}

/* EXPORT EXCEL */
function exportExcel(){

let ws = XLSX.utils.json_to_sheet(data);

let wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"DATA");

XLSX.writeFile(wb,"reservations.xlsx");
}

render();

</script>

</body>
</html>
