<script>

/* ==========================
   Configuration
========================== */

const STORAGE_KEY = "reservations";
let reservations = [];
let editIndex = -1;


/* ==========================
   Elements
========================== */

const table = document.getElementById("table");

const m = document.getElementById("m");
const nom = document.getElementById("nom");
const num = document.getElementById("num");
const etab = document.getElementById("etab");
const periode = document.getElementById("periode");
const status = document.getElementById("status");
const search = document.getElementById("search");


/* ==========================
   LocalStorage
========================== */

function load(){

    reservations = JSON.parse(

        localStorage.getItem(STORAGE_KEY)

    ) || [];

}


function save(){

    localStorage.setItem(

        STORAGE_KEY,

        JSON.stringify(reservations)

    );

}



/* ==========================
   Form
========================== */

function clearForm(){

    m.value="";
    nom.value="";
    num.value="";
    etab.value="";
    periode.value="";
    status.value="";

    editIndex=-1;

}



function getData(){

    return{

        m:m.value.trim(),

        nom:nom.value.trim(),

        num:num.value.trim(),

        etab:etab.value.trim(),

        periode:periode.value.trim(),

        status:status.value.trim()

    };

}



/* ==========================
   Add
========================== */

function addRes(){

    const data = getData();


    if(data.nom===""){

        alert("Entrer un NOM");

        return;

    }



    if(editIndex===-1){

        reservations.push(data);

    }

    else{

        reservations[editIndex]=data;

        editIndex=-1;

    }


    save();

    render();

    clearForm();

}



/* ==========================
   Edit
========================== */

function startEdit(index){

    const r = reservations[index];


    m.value=r.m;
    nom.value=r.nom;
    num.value=r.num;
    etab.value=r.etab;
    periode.value=r.periode;
    status.value=r.status;


    editIndex=index;

}



/* ==========================
   Delete
========================== */

function del(index){

    const ok = confirm(

        "Supprimer cette réservation ?"

    );


    if(!ok) return;



    reservations.splice(index,1);


    save();

    render();

}



/* ==========================
   Render
========================== */

function render(){


    table.innerHTML="";


    reservations.forEach((r,index)=>{


        const row=`

        <tr>

        <td>${index+1}</td>

        <td>${r.m}</td>

        <td>${r.nom}</td>

        <td>${r.num}</td>

        <td>${r.etab}</td>

        <td>${r.periode}</td>

        <td>${r.status}</td>

        <td>

        <button
        onclick="startEdit(${index})">

        ✏️

        </button>


        <button

        onclick="del(${index})"

        style="background:red;color:white;">

        🗑️

        </button>

        </td>

        </tr>

        `;


        table.innerHTML += row;


    });


}



/* ==========================
   Search
========================== */

function searchTable(){


    const value =

    search.value.toLowerCase();



    const rows =

    document.querySelectorAll(

        "#table tr"

    );



    rows.forEach(row=>{


        row.style.display =


        row.innerText
        .toLowerCase()
        .includes(value)


        ? ""

        : "none";


    });


}



/* ==========================
   Export CSV
========================== */

function downloadExcel(){


let csv="";


csv += "#,MLE,NOM,N°,ETABLISSEMENT,PERIODE,STATUS\n";


reservations.forEach((r,i)=>{


csv +=

`${i+1},

${r.m},

${r.nom},

${r.num},

${r.etab},

${r.periode},

${r.status}\n`;


});



const blob = new Blob(

[csv],

{

type:"text/csv"

}

);



const url=

URL.createObjectURL(blob);



const a=

document.createElement("a");


a.href=url;


a.download="Reservations.csv";


a.click();



URL.revokeObjectURL(url);


}




/* ==========================
   Init
========================== */

load();

render();

</script>
