<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservation System Pro</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0a0a0a;
color:#fff;
}

header{
padding:15px;
text-align:center;
font-size:20px;
border-bottom:1px solid #333;
}

.container{
padding:15px;
}

.card{
background:#111;
padding:12px;
margin-bottom:10px;
border:1px solid #333;
border-radius:8px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#000;
color:#fff;
border:1px solid #444;
border-radius:6px;
}

button{
padding:10px;
margin:5px;
background:#fff;
color:#000;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #333;
padding:8px;
text-align:center;
}

th{
background:#111;
}

.status-ok{
color:#00ff88;
font-weight:bold;
}

.status-no{
color:#ff4444;
font-weight:bold;
}
</style>
</head>

<body>

<header>RESERVATION SYSTEM BLACK/WHITE PRO</header>

<div class="container">

<!-- INPUT FORM -->
<div class="card">

<input id="mle" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="prenom" placeholder="PRENOM">
<input id="gsm" placeholder="GSM">
<input id="entite" placeholder="ENTITE">
<input id="lieu" placeholder="LIEU D'AFFECTATION">
<input id="date" type="date">

<input id="num" placeholder="N° RESERVATION">

<select id="type">
<option>EXCURSION</option>
<option>CONVENTION</option>
</select>

<input id="checkin" type="date">
<input id="checkout" type="date">

<input id="etab" placeholder="ETABLISSEMENT">

<select id="prise">
<option>BATAH</option>
<option>RADI</option>
<option>ANASS</option>
<option>BOUHO</option>
<option>KACHBAR</option>
<option>DRH</option>
<option>BAKOFFICE</option>
<option>AUTRE</option>
</select>

<select id="status">
<option value="ENCOURS">EN COURS</option>
<option value="CLOTURE">CLOTURE</option>
</select>

<button onclick="add()">AJOUTER</button>
<button onclick="clearF()">CLEAR</button>

</div>

<!-- BULK PASTE -->
<div class="card">

<textarea id="bulk" rows="6"
placeholder="MLE|NOM|PRENOM|GSM|ENTITE|LIEU"></textarea>

<button onclick="bulkImport()">IMPORT COLLER</button>

</div>

<!-- SEARCH -->
<div class="card">
<input id="search" onkeyup="render()" placeholder="RECHERCHE">
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>MLE</th>
<th>NOM</th>
<th>PRENOM</th>
<th>GSM</th>
<th>ENTITE</th>
<th>LIEU</th>
<th>STATUS</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>
</div>

<button onclick="exportExcel()">EXPORT EXCEL</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("db")||"[]");

function save(){
localStorage.setItem("db",JSON.stringify(data));
}

function add(){

data.push({
mle:mle.value,
nom:nom.value,
prenom:prenom.value,
gsm:gsm.value,
entite:entite.value,
lieu:lieu.value,
status:status.value
});

save();
render();
clearF();
}

function clearF(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

function bulkImport(){

let lines = bulk.value.trim().split("\n");

lines.forEach(l=>{
let p = l.split("|");
if(p.length>=6){
data.push({
mle:p[0],
nom:p[1],
prenom:p[2],
gsm:p[3],
entite:p[4],
lieu:p[5],
status:"ENCOURS"
});
}
});

save();
render();
bulk.value="";
}

function render(){

let v = search.value?.toLowerCase() || "";

t.innerHTML="";

data.forEach((r,i)=>{

let row = Object.values(r).join(" ").toLowerCase();

if(row.includes(v)){

t.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${r.mle}</td>
<td>${r.nom}</td>
<td>${r.prenom}</td>
<td>${r.gsm}</td>
<td>${r.entite}</td>
<td>${r.lieu}</td>
<td class="${r.status=='CLOTURE'?'status-ok':'status-no'}">${r.status}</td>
</tr>
`;

}

});

}

function exportExcel(){

let ws = XLSX.utils.json_to_sheet(data);

ws["!cols"] = [
{wch:5},{wch:10},{wch:10},{wch:12},
{wch:15},{wch:20},{wch:12},{wch:12}
];

let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"DATA");

XLSX.writeFile(wb,"reservations.xlsx");
}

render();

</script>

</body>
</html>
