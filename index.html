<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Avancée 3029</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:#e5e7eb;
}

.header{
padding:15px;
text-align:center;
color:#f5d36c;
font-size:20px;
letter-spacing:2px;
}

.card{
margin:15px;
padding:15px;
background:#111827;
border-radius:12px;
border:1px solid rgba(245,211,108,0.2);
}

input, textarea, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#f5d36c;
color:#0b1220;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:13px;
}

th{
color:#f5d36c;
}

tr:hover{
background:#1e293b;
}

.status-ok{color:#22c55e;font-weight:bold;}
.status-bad{color:#ef4444;font-weight:bold;}
</style>
</head>

<body>

<div class="header">SYSTÈME DE GESTION AVANCÉ 3029</div>

<div class="card">

<input id="search" placeholder="Recherche..." onkeyup="render()">

<textarea id="bulkData" rows="6"
placeholder="COLLER ICI: MLE|NOM|PRENOM|GSM|ENTITE|LIEU|DATE|N°|TYPE|CHECKIN|CHECKOUT|ETABLISSEMENT|PROPOSITION|PRISE_EN_CHARGE|STATUT"></textarea>

<button onclick="importBulk()">📋 Coller 2000+</button>
<button onclick="downloadExcel()">📥 Export Excel</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>MLE</th>
<th>NOM</th>
<th>PRENOM</th>
<th>GSM</th>
<th>ENTITE</th>
<th>LIEU</th>
<th>DATE</th>
<th>N°</th>
<th>TYPE</th>
<th>IN</th>
<th>OUT</th>
<th>ETAB</th>
<th>PROP</th>
<th>PRISE</th>
<th>STATUT</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("db") || "[]");

function save(){
localStorage.setItem("db", JSON.stringify(data));
}

/* ===== BULK IMPORT (2000+) ===== */
function importBulk(){

let lines = document.getElementById("bulkData").value.trim().split("\n");

lines.forEach(l=>{

let p = l.split("|");

if(p.length >= 16){

data.push({
mle:p[0], nom:p[1], prenom:p[2], gsm:p[3],
entite:p[4], lieu:p[5], date:p[6], num:p[7],
type:p[8], cin:p[9], cout:p[10], etab:p[11],
prop:p[12], prise:p[13], statut:p[14]
});

}

});

save();
render();
document.getElementById("bulkData").value="";
alert("Import terminé");

}

/* ===== RENDER ===== */
function render(){

let v = document.getElementById("search").value.toLowerCase();

let t = document.getElementById("table");
t.innerHTML="";

data.forEach((r,i)=>{

let txt = Object.values(r).join(" ").toLowerCase();
if(!txt.includes(v)) return;

t.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${r.mle||""}</td>
<td>${r.nom||""}</td>
<td>${r.prenom||""}</td>
<td>${r.gsm||""}</td>
<td>${r.entite||""}</td>
<td>${r.lieu||""}</td>
<td>${r.date||""}</td>
<td>${r.num||""}</td>
<td>${r.type||""}</td>
<td>${r.cin||""}</td>
<td>${r.cout||""}</td>
<td>${r.etab||""}</td>
<td>${r.prop||""}</td>
<td>${r.prise||""}</td>
<td class="${r.statut=='CLOTURE'?'status-ok':'status-bad'}">
${r.statut||""}
</td>
</tr>
`;

});

}

/* ===== EXCEL EXPORT ===== */
function downloadExcel(){

let ws = XLSX.utils.json_to_sheet(data);

ws["!cols"] = [
{wch:6},{wch:10},{wch:10},{wch:10},{wch:12},
{wch:12},{wch:10},{wch:8},{wch:10},{wch:10},
{wch:8},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10}
];

let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "DATA");

XLSX.writeFile(wb, "gestion.xlsx");
}

render();

</script>

</body>
</html>
