<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Smart Reservation System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f4f8ff;
color:#0b1b33;
}

/* HEADER */
.header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
font-size:20px;
font-weight:bold;
letter-spacing:1px;
}

/* CARDS */
.card{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #cfe0ff;
border-radius:8px;
outline:none;
}

input:focus{
border-color:#1e3a8a;
}

/* BUTTON */
button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e3a8a;
color:white;
}

button:hover{
background:#2563eb;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e3a8a;
color:white;
padding:10px;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #e5edff;
font-size:13px;
}

tr:hover{
background:#f0f6ff;
}

/* STATUS */
.status-ok{
color:green;
font-weight:bold;
}

.status-no{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
SMART RESERVATION SYSTEM - BLUE EDITION
</div>

<div class="card">

<h3>AJOUT / MODIFICATION</h3>

<input id="mle" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="prenom" placeholder="PRENOM">
<input id="gsm" placeholder="GSM">
<input id="entite" placeholder="ENTITE">
<input id="lieu" placeholder="LIEU D'AFFECTATION">

<input id="date" placeholder="DATE DE DEMANDE">
<input id="numres" placeholder="N° RESERVATION">

<input id="type" placeholder="TYPE (EXCURSION / CONVENTION)">
<input id="checkin" placeholder="CHECK IN">
<input id="checkout" placeholder="CHECK OUT">

<input id="etab" placeholder="ETABLISSEMENT">

<select id="prise">
<option>BATAH</option>
<option>RADI</option>
<option>ANASS</option>
<option>BOUHO</option>
<option>KACHBAR</option>
<option>DRH</option>
<option>BAKOFFICE</option>
<option>AUTRE</option>
</select>

<select id="status">
<option value="ENC">EN COURS</option>
<option value="CLO">CLOTURE</option>
</select>

<button onclick="add()">Ajouter</button>
<button onclick="clearForm()">Vider</button>

</div>

<div class="card">

<h3>IMPORT COLLABORATEURS (Ctrl+V Excel)</h3>

<textarea id="bulk" rows="6"
placeholder="MLE | NOM | PRENOM | GSM | ENTITE | LIEU"></textarea>

<button onclick="importBulk()">Importer employés</button>

</div>

<div class="card">

<h3>HOTELS IMPORT</h3>

<textarea id="hotels" rows="4"
placeholder="Liste hôtels (une par ligne)"></textarea>

<button onclick="importHotels()">Importer hotels</button>

</div>

<div class="card">

<input id="search" onkeyup="render()" placeholder="Recherche...">

</div>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>MLE</th>
<th>NOM</th>
<th>PRENOM</th>
<th>GSM</th>
<th>ENTITE</th>
<th>LIEU</th>
<th>STATUS</th>
<th>ACTIONS</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
