<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Future Reservation XLSX</title>

<!-- XLSX LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}

.header{
text-align:center;
padding:20px;
color:#f5d36c;
font-size:22px;
}

.card{
margin:15px;
padding:15px;
background:#111827;
border-radius:12px;
border:1px solid #f5d36c33;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#0b1220;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#f5d36c;
color:#0b1220;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
}

th{
color:#f5d36c;
}

tr:hover{
background:#1e293b;
}
</style>
</head>

<body>

<div class="header">RESERVATION SYSTEM 3029</div>

<div class="card">
<input id="m" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="num" placeholder="N°">
<input id="etab" placeholder="ETABLISSEMENT">
<input id="periode" placeholder="PERIODE">
<input id="status" placeholder="STATUS">

<button onclick="addRes()">Ajouter</button>
<button onclick="clearForm()">Annuler</button>
<button onclick="downloadExcel()">📥 Excel</button>
</div>

<div class="card">
<input id="search" onkeyup="searchTable()" placeholder="Recherche...">
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>MLE</th>
<th>NOM</th>
<th>N°</th>
<th>ETAB</th>
<th>PERIODE</th>
<th>STATUS</th>
<th>ACTIONS</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

let reservations = JSON.parse(localStorage.getItem("res") || "[]");
let editIndex = -1;

function save(){
localStorage.setItem("res", JSON.stringify(reservations));
}

function getData(){
return {
m: document.getElementById("m").value.trim(),
nom: document.getElementById("nom").value.trim(),
num: document.getElementById("num").value.trim(),
etab: document.getElementById("etab").value.trim(),
periode: document.getElementById("periode").value.trim(),
status: document.getElementById("status").value.trim()
};
}

function clearForm(){
document.getElementById("m").value="";
document.getElementById("nom").value="";
document.getElementById("num").value="";
document.getElementById("etab").value="";
document.getElementById("periode").value="";
document.getElementById("status").value="";
editIndex=-1;
}

function addRes(){

let d=getData();

if(d.nom===""){
alert("NOM obligatoire");
return;
}

if(editIndex===-1){
reservations.push(d);
}else{
reservations[editIndex]=d;
editIndex=-1;
}

save();
render();
clearForm();
}

function startEdit(i){

let r=reservations[i];

document.getElementById("m").value=r.m;
document.getElementById("nom").value=r.nom;
document.getElementById("num").value=r.num;
document.getElementById("etab").value=r.etab;
document.getElementById("periode").value=r.periode;
document.getElementById("status").value=r.status;

editIndex=i;
}

function del(i){
reservations.splice(i,1);
save();
render();
}

function render(){

let t=document.getElementById("table");
t.innerHTML="";

reservations.forEach((r,i)=>{
t.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.m}</td>
<td>${r.nom}</td>
<td>${r.num}</td>
<td>${r.etab}</td>
<td>${r.periode}</td>
<td>${r.status}</td>
<td>
<button onclick="startEdit(${i})">✏</button>
<button onclick="del(${i})" style="background:red;color:white;">🗑</button>
</td>
</tr>`;
});

}

function searchTable(){

let v=document.getElementById("search").value.toLowerCase();

document.querySelectorAll("#table tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});

}

/* ===== EXCEL EXPORT ===== */
function downloadExcel(){

let data = reservations.map((r,i)=>({
"#": i+1,
"MLE": r.m,
"NOM": r.nom,
"N°": r.num,
"ETABLISSEMENT": r.etab,
"PERIODE": r.periode,
"STATUS": r.status
}));

let ws = XLSX.utils.json_to_sheet(data);

ws["!cols"] = [
{wch:5},
{wch:10},
{wch:15},
{wch:10},
{wch:20},
{wch:15},
{wch:10}
];

let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Reservations");

XLSX.writeFile(wb, "Reservations.xlsx");
}

render();

</script>

</body>
</html>
