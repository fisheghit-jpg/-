<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reservation System Pro</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:#e5e7eb;
}

/* HEADER */
.header{
text-align:center;
padding:18px;
font-size:20px;
color:#f5d36c;
letter-spacing:2px;
}

/* CARD */
.card{
margin:12px;
padding:12px;
background:#111827;
border-radius:12px;
border:1px solid #2a2f3a;
}

/* INPUT */
input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
outline:none;
}

input:focus,select:focus,textarea:focus{
border:1px solid #f5d36c;
}

/* BUTTON */
button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#f5d36c;
color:#0b1220;
font-weight:bold;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
color:#f5d36c;
padding:10px;
border-bottom:1px solid #2a2f3a;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:13px;
}

tr:hover{
background:#1e293b;
}
</style>
</head>

<body>

<div class="header">RESERVATION SYSTEM PRO</div>

<!-- FORM -->
<div class="card">

<input id="mle" placeholder="MLE">
<input id="nom" placeholder="NOM">
<input id="res" placeholder="N° DE RESERVATION">

<select id="type">
<option>EXCURSION</option>
<option>CONVENTION</option>
</select>

<input id="checkin" placeholder="CHECK IN">
<input id="checkout" placeholder="CHECK OUT">
<input id="prop" placeholder="PROPOSITION">
<input id="etab" placeholder="ETABLISSEMENT">

<select id="prise">
<option>BAKOFFICE</option>
<option>RECEPTION</option>
<option>DIRECT</option>
</select>

<button onclick="addRes()">Ajouter</button>
<button onclick="clearForm()">Annuler</button>
<button onclick="downloadExcel()">Excel</button>

</div>

<!-- BULK -->
<div class="card">
<textarea id="bulk" rows="6"
placeholder="MLE|NOM|RES|TYPE|IN|OUT|PROP|ETAB|PRISE"></textarea>
<button onclick="bulkImport()">Importer 2000+</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" onkeyup="render()" placeholder="Recherche">
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>MLE</th>
<th>NOM</th>
<th>RES</th>
<th>TYPE</th>
<th>IN</th>
<th>OUT</th>
<th>PROP</th>
<th>ETAB</th>
<th>PRISE</th>
<th>ACTION</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>
</div>

<script>

let reservations = JSON.parse(localStorage.getItem("res") || "[]");

/* SAVE */
function save(){
localStorage.setItem("res", JSON.stringify(reservations));
}

/* CLEAR */
function clearForm(){
mle.value="";
nom.value="";
res.value="";
checkin.value="";
checkout.value="";
prop.value="";
etab.value="";
}

/* ADD */
function addRes(){

reservations.push({
m:mle.value,
n:nom.value,
r:res.value,
t:type.value,
ci:checkin.value,
co:checkout.value,
p:prop.value,
e:etab.value,
pr:prise.value
});

save();
render();
clearForm();
}

/* DELETE */
function del(i){
reservations.splice(i,1);
save();
render();
}

/* BULK IMPORT (2000+) */
function bulkImport(){

let lines = bulk.value.trim().split("\n");

lines.forEach(l=>{

let p = l.split("|");

if(p.length>=9){

reservations.push({
m:p[0],n:p[1],r:p[2],t:p[3],
ci:p[4],co:p[5],p:p[6],e:p[7],pr:p[8]
});

}

});

save();
render();
bulk.value="";

}

/* RENDER */
function render(){

let v = search.value?.toLowerCase() || "";
t.innerHTML="";

reservations.forEach((r,i)=>{

let row = (Object.values(r).join(" ")).toLowerCase();

if(row.includes(v)){

t.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${r.m}</td>
<td>${r.n}</td>
<td>${r.r}</td>
<td>${r.t}</td>
<td>${r.ci}</td>
<td>${r.co}</td>
<td>${r.p}</td>
<td>${r.e}</td>
<td>${r.pr}</td>
<td><button onclick="del(${i})">🗑</button></td>
</tr>
`;

}

});

}

/* EXCEL */
function downloadExcel(){

let ws = XLSX.utils.json_to_sheet(reservations.map((r,i)=>({
"#":i+1,...r
})));

let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Reservations");

XLSX.writeFile(wb,"Reservations.xlsx");

}

render();

</script>

</body>
</html>
