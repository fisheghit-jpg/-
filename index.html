<script>

const STORAGE_KEY = "reservations";

let reservations = [];
let editIndex = null;


/*=========================
تحميل البيانات
=========================*/
function loadData(){

    reservations = JSON.parse(
        localStorage.getItem(STORAGE_KEY)
    ) || [];

}


/*=========================
حفظ البيانات
=========================*/
function saveData(){

    localStorage.setItem(

        STORAGE_KEY,

        JSON.stringify(reservations)

    );

}


/*=========================
قراءة الحقول
=========================*/
function getFormData(){

    return{

        m:
        document.getElementById("m").value.trim(),

        nom:
        document.getElementById("nom").value.trim(),

        num:
        document.getElementById("num").value.trim(),

        etab:
        document.getElementById("etab").value.trim(),

        periode:
        document.getElementById("periode").value.trim(),

        status:
        document.getElementById("status").value.trim()

    };

}



/*=========================
تفريغ الحقول
=========================*/
function clearForm(){

document.getElementById("m").value="";
document.getElementById("nom").value="";
document.getElementById("num").value="";
document.getElementById("etab").value="";
document.getElementById("periode").value="";
document.getElementById("status").value="";

editIndex=null;

}




/*=========================
إضافة / تعديل
=========================*/
function addRes(){

const data=getFormData();


if(!data.nom){

alert("Nom obligatoire");

return;

}



if(editIndex===null){

reservations.push(data);

}

else{

reservations[editIndex]=data;

editIndex=null;

}



saveData();

render();

clearForm();

}



/*=========================
تعديل
=========================*/
function startEdit(i){

const r=reservations[i];


document.getElementById("m").value=r.m;
document.getElementById("nom").value=r.nom;
document.getElementById("num").value=r.num;
document.getElementById("etab").value=r.etab;
document.getElementById("periode").value=r.periode;
document.getElementById("status").value=r.status;


editIndex=i;

}




/*=========================
حذف
=========================*/
function del(i){

if(confirm("Supprimer ?")){


reservations.splice(i,1);

saveData();

render();

}


}



/*=========================
عرض الجدول
=========================*/
function render(){


const table=document.getElementById("table");

table.innerHTML="";


reservations.forEach((r,index)=>{


table.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${r.m}</td>

<td>${r.nom}</td>

<td>${r.num}</td>

<td>${r.etab}</td>

<td>${r.periode}</td>

<td>${r.status}</td>

<td>

<button onclick="startEdit(${index})">

✏️

</button>


<button onclick="del(${index})">

🗑️

</button>

</td>

</tr>

`;


});


}





/*=========================
بحث
=========================*/
function searchTable(){

const text=
document.getElementById("search")
.value
.toLowerCase();


const rows=
document.querySelectorAll("#table tr");


rows.forEach(row=>{

row.style.display=

row.innerText
.toLowerCase()
.includes(text)

? ""

:

"none";

});


}




/*=========================
تشغيل النظام
=========================*/

loadData();

render();


</script>
