<script>

let reservations = JSON.parse(localStorage.getItem("res") || "[]");
let editIndex = -1;

/* حفظ البيانات */
function save(){
localStorage.setItem("res", JSON.stringify(reservations));
}

/* تفريغ الحقول */
function clearForm(){
document.getElementById("m").value = "";
document.getElementById("nom").value = "";
document.getElementById("num").value = "";
document.getElementById("etab").value = "";
document.getElementById("periode").value = "";
document.getElementById("status").value = "";

editIndex = -1;
}

/* إضافة أو تعديل */
function addRes(){

let data = {
m: document.getElementById("m").value.trim(),
nom: document.getElementById("nom").value.trim(),
num: document.getElementById("num").value.trim(),
etab: document.getElementById("etab").value.trim(),
periode: document.getElementById("periode").value.trim(),
status: document.getElementById("status").value.trim()
};

if(editIndex === -1){
reservations.push(data);
}else{
reservations[editIndex] = data;
editIndex = -1;
}

save();
render();
clearForm();
}

/* حذف */
function del(i){
reservations.splice(i,1);
save();
render();
}

/* تعديل */
function startEdit(i){

let r = reservations[i];

document.getElementById("m").value = r.m;
document.getElementById("nom").value = r.nom;
document.getElementById("num").value = r.num;
document.getElementById("etab").value = r.etab;
document.getElementById("periode").value = r.periode;
document.getElementById("status").value = r.status;

editIndex = i;
}

/* عرض الجدول */
function render(){

let table = document.getElementById("table");
table.innerHTML = "";

reservations.forEach((r,i)=>{

table.innerHTML += `
<tr>
<td>${i + 1}</td>
<td>${r.m}</td>
<td>${r.nom}</td>
<td>${r.num}</td>
<td>${r.etab}</td>
<td>${r.periode}</td>
<td>${r.status}</td>
<td>
<button onclick="startEdit(${i})">✏</button>
<button onclick="del(${i})" style="background:red;color:white;">🗑</button>
</td>
</tr>
`;
});
}

/* بحث */
function searchTable(){

let value = document.getElementById("search").value.toLowerCase();
let rows = document.querySelectorAll("#table tr");

rows.forEach(row=>{
row.style.display = row.innerText.toLowerCase().includes(value)
? "" : "none";
});

}

/* تشغيل أولي */
render();

</script>
